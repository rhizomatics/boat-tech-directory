name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy docs
        uses: mhausenblas/mkdocs-deploy-gh-pages@master
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            REQUIREMENTS: requirements_docs.txt
