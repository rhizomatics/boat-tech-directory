[project]
site_name = "Awesome Boat Tech"
site_url = "https://awesome-boat-tech.rhizomatics.org.uk"
site_author = "Jey Burrows"
site_description = "A curated list of marine electronics, NMEA, SignalK, OpenCPN and other open source boat tech projects, vendor hardware and software, blogs and forums."

docs_dir = "docs"
site_dir = "site"

repo_url = "https://github.com/SY-Sea-Jade/awesome-boat-tech"
repo_name = "SY-Sea-Jade/awesome-boat-tech"

copyright = "CC0 1.0 Universal (CC0 1.0) Public Domain Dedication. No Rights Reserved."

nav = [
  {"Home" = "index.md"},
  {"Blogs" = "blogs.md"},
  {"Vlogs" = "vlogs.md"},
  {"Charts" = "charts.md"},
  {"Open Source Projects" = "open-source-projects.md"},
  {"Protocols" = "protocols.md"},
  {"Hardware Vendors" = "hardware-vendors.md"},
  {"Software Vendors" = "software-vendors.md"},
  {"Consultants" = "consultants.md"},
  {"Forums" = "forums.md"},
  {"Education and Reference" = "education.md"},
  {"News" = "news.md"},
  {"Contributing" = "contributing.md"}
]

[project.theme]
language = "en"
logo = "images/logo.jpg"
features = [
  "content.action.edit", # Edit this page
  "content.action.view",  # View source of this page
  "search.highlight",
  "navigation.instant",
  "navigation.tracking",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "toc.follow",
  "toc.integrate",
  "navigation.top"
]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.smartsymbols]
